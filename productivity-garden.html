<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Productivity Garden</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --soil:      #2c1f0e;
    --soil-mid:  #3d2b14;
    --soil-top:  #5a3e20;
    --parchment: #f5eedc;
    --ink:       #1a120a;
    --moss:      #4a7c40;
    --sage:      #7aad6a;
    --fern:      #a8d49a;
    --golden:    #c8860a;
    --amber:     #f0b030;
    --rust:      #8b3a1a;
    --ash:       #6b6055;
    --bark:      #7a5230;
    --sky:       #d4e8c2;
    --dead:      #5a4a38;
  }

  body {
    background: var(--soil);
    color: var(--parchment);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow: hidden;
    cursor: crosshair;
  }

  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 28px;
    background: linear-gradient(to bottom, var(--soil) 60%, transparent);
    pointer-events: none;
  }
  #header h1 {
    font-family: 'Fraunces', serif;
    font-size: 1.5rem;
    font-weight: 300;
    letter-spacing: 0.04em;
    color: var(--fern);
    pointer-events: all;
  }
  #header .hint {
    font-size: 0.65rem;
    color: var(--ash);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  #garden {
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 80% 40% at 50% 100%, var(--soil-mid) 0%, var(--soil) 70%),
      repeating-linear-gradient(90deg, transparent 0px, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px),
      repeating-linear-gradient(0deg,  transparent 0px, transparent 39px, rgba(255,255,255,0.015) 39px, rgba(255,255,255,0.015) 40px);
  }
  #garden::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 70px;
    background: linear-gradient(to top, var(--soil-top), transparent);
    pointer-events: none;
  }

  .plant-wrap {
    position: absolute;
    transform: translate(-50%, -100%);
    cursor: pointer;
    user-select: none;
    transition: filter 0.3s;
  }
  .plant-wrap:hover { filter: brightness(1.3); }
  .plant-svg { display: block; }

  .plant-label {
    position: absolute;
    bottom: -22px; left: 50%; transform: translateX(-50%);
    white-space: nowrap;
    font-size: 0.58rem;
    color: var(--ash);
    letter-spacing: 0.08em;
    pointer-events: none;
  }

  .modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    background: rgba(20,12,4,0.75);
    backdrop-filter: blur(4px);
    animation: fadeIn 0.18s ease;
  }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }

  .modal {
    background: var(--soil-mid);
    border: 1px solid var(--bark);
    border-radius: 4px;
    padding: 32px 36px;
    width: 340px; max-width: 92vw;
    box-shadow: 0 24px 64px rgba(0,0,0,0.6);
    animation: slideUp 0.22s cubic-bezier(.22,.68,0,1.2);
    cursor: default;
  }
  @keyframes slideUp { from { transform: translateY(18px); opacity:0 } to { transform: none; opacity:1 } }

  .modal h2 {
    font-family: 'Fraunces', serif;
    font-weight: 300; font-size: 1.25rem;
    color: var(--fern); margin-bottom: 22px;
  }

  .modal label {
    display: block;
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--ash); margin-bottom: 6px;
  }

  .modal input[type="text"] {
    width: 100%;
    background: var(--soil);
    border: 1px solid var(--bark); border-radius: 3px;
    color: var(--parchment);
    font-family: 'DM Mono', monospace; font-size: 0.85rem;
    padding: 9px 12px; outline: none;
    transition: border-color 0.2s; margin-bottom: 20px;
    cursor: text;
  }
  .modal input[type="text"]:focus { border-color: var(--sage); }

  .modal input[type="number"] {
    width: 100%;
    background: var(--soil);
    border: 1px solid var(--bark); border-radius: 3px;
    color: var(--parchment);
    font-family: 'DM Mono', monospace; font-size: 0.85rem;
    padding: 9px 12px; outline: none;
    transition: border-color 0.2s; margin-bottom: 20px;
    cursor: text;
    appearance: textfield;
  }
  .modal input[type="number"]:focus { border-color: var(--sage); }

  .modal select {
    width: 100%;
    background: var(--soil);
    border: 1px solid var(--bark); border-radius: 3px;
    color: var(--parchment);
    font-family: 'DM Mono', monospace; font-size: 0.85rem;
    padding: 9px 12px; outline: none;
    transition: border-color 0.2s; margin-bottom: 20px;
    cursor: pointer;
    appearance: none;
  }
  .modal select:focus { border-color: var(--sage); }

  .duration-row { display: flex; gap: 8px; margin-bottom: 24px; }
  .dur-btn {
    flex: 1;
    background: var(--soil);
    border: 1px solid var(--bark); border-radius: 3px;
    color: var(--ash);
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    padding: 8px 4px; cursor: pointer;
    transition: all 0.15s;
  }
  .dur-btn:hover { border-color: var(--sage); color: var(--fern); }
  .dur-btn.active { background: var(--moss); border-color: var(--sage); color: var(--parchment); }

  .modal-actions { display: flex; gap: 10px; }

  .btn-primary {
    flex: 1; background: var(--moss); border: none; border-radius: 3px;
    color: var(--parchment);
    font-family: 'DM Mono', monospace; font-size: 0.8rem; letter-spacing: 0.06em;
    padding: 10px; cursor: pointer; transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--sage); color: var(--ink); }

  .btn-secondary {
    flex: 1; background: transparent;
    border: 1px solid var(--bark); border-radius: 3px;
    color: var(--ash);
    font-family: 'DM Mono', monospace; font-size: 0.8rem;
    padding: 10px; cursor: pointer; transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--ash); color: var(--parchment); }

  .detail-panel {
    position: fixed; bottom: 24px; right: 24px; z-index: 150;
    background: var(--soil-mid);
    border: 1px solid var(--bark); border-radius: 4px;
    padding: 20px 24px; width: 260px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    animation: slideUp 0.2s ease;
    cursor: default;
  }
  .detail-panel h3 {
    font-family: 'Fraunces', serif;
    font-weight: 300; font-size: 1rem;
    color: var(--fern); margin-bottom: 12px;
    word-break: break-word;
  }
  .detail-row {
    display: flex; justify-content: space-between;
    font-size: 0.65rem; color: var(--ash);
    letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .detail-row span:last-child { color: var(--parchment); }
  .detail-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }

  .btn-complete {
    background: var(--moss); border: none; border-radius: 3px;
    color: var(--parchment);
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    padding: 9px; cursor: pointer; transition: background 0.15s;
  }
  .btn-complete:hover { background: var(--sage); color: var(--ink); }

  .btn-delete {
    background: transparent; border: 1px solid var(--rust); border-radius: 3px;
    color: var(--rust);
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    padding: 9px; cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .btn-delete:hover {
    background: rgba(139,58,26,0.18);
    color: var(--parchment);
    border-color: var(--amber);
  }

  .btn-close {
    background: transparent; border: 1px solid var(--bark); border-radius: 3px;
    color: var(--ash);
    font-family: 'DM Mono', monospace; font-size: 0.75rem;
    padding: 8px; cursor: pointer;
  }
  .btn-close:hover { color: var(--parchment); }

  #statusbar {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    display: flex; gap: 24px; align-items: center;
    padding: 10px 28px;
    background: linear-gradient(to top, var(--soil) 60%, transparent);
    pointer-events: none;
    font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ash);
  }
  #statusbar span b { color: var(--fern); font-weight: 500; }
  #statusbar span.dead b { color: var(--rust); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const STORAGE_KEY = 'productivity_garden_v1';
const TICK_MS     = 1200; // artımı daha hamar hiss etdirmək üçün
const DURATIONS   = [15, 30, 60]; // köhnə funksiya üçün qalıb; məcburi deyil
const PLANT_TYPES = [
  'sprout',
  'flower',
  'tree',
  'cactus',
  'bush',
  'vine',
  'mushroom',
  'succulent',
  'palm',
  'fern',
  'grain',
];
// calcGrowthStage 0..4 aralığında "float" dəyər qaytarır

function generateId() {
  return Math.random().toString(36).slice(2, 10);
}

function calcGrowthStage(plant, now) {
  if (plant.isCompleted) return 4;
  if (plant.isDead)      return plant.growthStage;

  const total   = plant.deadline - plant.plantedAt;
  if (total <= 0) return 4;

  const elapsed  = now - plant.plantedAt;
  const fraction = Math.min(Math.max(elapsed / total, 0), 1); // 0..1
  const stage    = 4 * fraction; // 0..4

  // çox incə float dəyişiklikləri state update-ləri çoxaltmasın deyə kvantlaşdırırıq
  return Math.round(stage * 20) / 20; // addım: 0.05
}

function formatTimeLeft(plant, now) {
  if (plant.isDead)      return 'məhv oldu';
  if (plant.isCompleted) return 'tamamlandı ✓';
  const ms = plant.deadline - now;
  if (ms <= 0) return 'vaxt bitdi';
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  return m > 0 ? `${m}d ${s}s qaldı` : `${s}s qaldı`;
}

function loadPlants() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
}

function savePlants(plants) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(plants)); } catch {}
}

/* ── SVG Plants ── */
function PlantSVG({ type, stage, isDead, isCompleted }) {
  const size = 48 + stage * 18; // bitkilər daha böyük olsun
  const dead = isDead && !isCompleted;
  const c1 = dead ? 'var(--dead)' : 'var(--moss)';
  const c2 = dead ? '#4a3d2e'    : 'var(--sage)';
  const c3 = dead ? '#3a2e20'    : 'var(--fern)';
  const cs = dead ? '#3a2e1a'    : 'var(--bark)';
  const w = size, h = size + 10;

  if (type === 'flower') {
    const petals = stage < 1 ? 0 : stage < 2 ? 2 : stage < 3 ? 4 : 6;
    const pr = 5 + stage;
    const cy0 = h - stage * 8 - 12;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
        <line x1={w/2} y1={h} x2={w/2} y2={cy0} stroke={cs} strokeWidth="2.5" strokeLinecap="round"/>
        {Array.from({length: petals}).map((_, i) => {
          const angle = (i / petals) * Math.PI * 2;
          const px = w/2 + Math.cos(angle) * (pr + 3);
          const py = cy0 + Math.sin(angle) * (pr + 3);
          return <ellipse key={i} cx={px} cy={py} rx={pr} ry={pr*0.6} fill={c2} opacity="0.85"
                          transform={`rotate(${angle*180/Math.PI},${px},${py})`}/>;
        })}
        {stage >= 2 && <circle cx={w/2} cy={cy0} r={pr-1} fill={dead ? '#5a3a20' : 'var(--amber)'}/>}
        {stage < 0.01 && <ellipse cx={w/2} cy={h-8} rx={4} ry={3} fill={c1}/>}
      </svg>
    );
  }

  if (type === 'cactus') {
    const bh = 10 + stage * 8;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
        <rect x={w/2-5} y={h-bh} width={10} height={bh} rx={5} fill={c1}/>
        {stage >= 2 && <>
          <rect x={w/2-16} y={h-bh+8} width={12} height={7} rx={4} fill={c1}/>
          <rect x={w/2-16} y={h-bh+8} width={7} height={13} rx={4} fill={c1}/>
        </>}
        {stage >= 3 && <>
          <rect x={w/2+4} y={h-bh+14} width={12} height={7} rx={4} fill={c1}/>
          <rect x={w/2+9} y={h-bh+14} width={7} height={13} rx={4} fill={c1}/>
        </>}
        {stage === 4 && !dead && <circle cx={w/2} cy={h-bh-2} r={5} fill="var(--amber)"/>}
        {stage < 0.01 && <ellipse cx={w/2} cy={h-7} rx={4} ry={3} fill={c1}/>}
      </svg>
    );
  }

  if (type === 'tree') {
    const th = 8 + stage * 5;
    const lr = 6 + stage * 5;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
        {stage >= 1 && <rect x={w/2-3} y={h-th} width={6} height={th} rx={3} fill={cs}/>}
        {stage >= 1 && <circle cx={w/2} cy={h-th-lr*0.7} r={lr} fill={c1}/>}
        {stage >= 2 && <circle cx={w/2} cy={h-th-lr*1.4} r={lr*0.8} fill={c2}/>}
        {stage >= 3 && <circle cx={w/2} cy={h-th-lr*2}   r={lr*0.6} fill={c3}/>}
        {stage < 0.01 && <ellipse cx={w/2} cy={h-7} rx={4} ry={3} fill={c1}/>}
      </svg>
    );
  }

  if (type === 'bush') {
    const stemH = 6 + stage * 4;
    const spread = 7 + stage * 4;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
        {stage >= 1 && <rect x={w/2-3} y={h-stemH} width={6} height={stemH} rx={3} fill={cs}/>}
        {stage >= 1 && (
          <>
            <ellipse cx={w/2} cy={h-stemH-4} rx={spread} ry={spread*0.55} fill={c1} opacity="0.92"/>
            {stage >= 2 && <ellipse cx={w/2-spread*0.55} cy={h-stemH} rx={spread*0.45} ry={spread*0.32} fill={c2} opacity="0.88"/>}
            {stage >= 2 && <ellipse cx={w/2+spread*0.55} cy={h-stemH+2} rx={spread*0.42} ry={spread*0.3} fill={c2} opacity="0.86"/>}
            {stage >= 3 && <ellipse cx={w/2-spread*0.15} cy={h-stemH-8} rx={spread*0.34} ry={spread*0.26} fill={c3} opacity="0.86"/>}
          </>
        )}
        {stage >= 4 && !dead && <circle cx={w/2+spread*0.22} cy={h-stemH-2} r={4} fill="var(--amber)"/>}
        {stage < 0.01 && <ellipse cx={w/2} cy={h-7} rx={4} ry={3} fill={c1}/>}
      </svg>
    );
  }

  if (type === 'vine') {
    const stem = 8 + stage * 6;
    const leafY = h - stem + 2;
    const curl = 6 + stage * 3;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
        {stage >= 1 && (
          <>
            <path
              d={`M ${w/2} ${h} C ${w/2+curl} ${h-stem*0.35}, ${w/2-curl} ${h-stem*0.75}, ${w/2} ${h-stem}`}
              stroke={cs} strokeWidth="2.6" fill="none" strokeLinecap="round"
            />
            {stage >= 2 && <path d={`M ${w/2} ${leafY} C ${w/2-10} ${leafY+6}, ${w/2-8} ${leafY-2}, ${w/2-2} ${leafY-6}`} stroke={c1} strokeWidth="2.2" fill="none" strokeLinecap="round" opacity="0.95"/>}
            {stage >= 2 && <path d={`M ${w/2} ${leafY+4} C ${w/2+10} ${leafY+2}, ${w/2+8} ${leafY+10}, ${w/2+2} ${leafY+6}`} stroke={c2} strokeWidth="2.2" fill="none" strokeLinecap="round" opacity="0.9"/>}
            {stage >= 3 && <circle cx={w/2} cy={h-stem+4} r={5} fill={c3} opacity="0.7"/>}
          </>
        )}
        {stage >= 4 && !dead && <circle cx={w/2+curl*0.7} cy={h-stem+1} r={4} fill="var(--amber)"/>}
        {stage < 0.01 && <ellipse cx={w/2} cy={h-7} rx={4} ry={3} fill={c1}/>}
      </svg>
    );
  }

  if (type === 'mushroom') {
    const capR = 7 + stage * 4;
    const stemH = 8 + stage * 4;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
        {stage >= 1 && <rect x={w/2-4} y={h-stemH} width={8} height={stemH} rx={4} fill={cs} opacity="0.95"/>}
        {stage >= 1 && (
          <>
            <path
              d={`M ${w/2-capR} ${h-stemH} Q ${w/2} ${h-stemH-capR*0.95} ${w/2+capR} ${h-stemH} Q ${w/2} ${h-stemH+capR*0.25} ${w/2-capR} ${h-stemH}`}
              fill={dead ? '#5a3a20' : c2}
              opacity="0.95"
            />
            {stage >= 2 && Array.from({ length: stage < 3 ? 3 : 6 }).map((_, i) => {
              const angle = (i / (stage < 3 ? 3 : 6)) * Math.PI * 2;
              const px = w/2 + Math.cos(angle) * capR * 0.45;
              const py = h-stemH + Math.sin(angle) * capR * 0.18 - 2;
              return <circle key={i} cx={px} cy={py} r={2} fill="rgba(245,238,220,0.55)"/>;
            })}
          </>
        )}
        {stage >= 4 && !dead && <rect x={w/2-3} y={h-stemH+3} width={6} height={4} rx={2} fill="var(--amber)" opacity="0.95"/>}
        {stage < 0.01 && <ellipse cx={w/2} cy={h-7} rx={4} ry={3} fill={c1}/>}
      </svg>
    );
  }

  if (type === 'succulent') {
    const rosette = 10 + stage * 4;
    const leaves = stage < 2 ? 5 : stage < 3 ? 7 : stage < 4 ? 9 : 11;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
        {stage >= 1 && <circle cx={w/2} cy={h-12} r={rosette*0.22} fill={dead ? '#3a2e20' : 'var(--amber)'} opacity="0.85"/>}
        {stage >= 1 && Array.from({ length: leaves }).map((_, i) => {
          const angle = (i / leaves) * Math.PI * 2;
          const px = w/2 + Math.cos(angle) * rosette * 0.38;
          const py = h-12 + Math.sin(angle) * rosette * 0.18;
          const rx = 6 + stage * 0.8;
          const ry = 3.8 + stage * 0.5;
          const fill = i % 3 === 0 ? c1 : i % 3 === 1 ? c2 : c3;
          return (
            <ellipse
              key={i}
              cx={px}
              cy={py}
              rx={rx}
              ry={ry}
              fill={fill}
              opacity={0.9}
              transform={`rotate(${angle*180/Math.PI},${px},${py})`}
            />
          );
        })}
        {stage < 0.01 && <ellipse cx={w/2} cy={h-7} rx={4} ry={3} fill={c1}/>}
      </svg>
    );
  }

  if (type === 'palm') {
    const trunkH = 10 + stage * 6;
    const frondR = 10 + stage * 5;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
        {stage >= 1 && <rect x={w/2-4} y={h-trunkH} width={8} height={trunkH} rx={4} fill={cs}/>}
        {stage >= 1 && (
          <>
            {Array.from({ length: stage < 2 ? 3 : stage < 3 ? 4 : stage < 4 ? 5 : 6 }).map((_, i) => {
              const t = i / (stage < 2 ? 3 : stage < 3 ? 4 : stage < 4 ? 5 : 6);
              const ang = -80 + t * 160;
              const x2 = w/2 + Math.cos((ang*Math.PI)/180) * frondR;
              const y2 = h-trunkH + Math.sin((ang*Math.PI)/180) * frondR * 0.6 - 2;
              return (
                <path
                  key={i}
                  d={`M ${w/2} ${h-trunkH+2} Q ${(w/2+x2)/2} ${h-trunkH-10}, ${x2} ${y2}`}
                  stroke={c2} strokeWidth="2.6" fill="none" strokeLinecap="round"
                  opacity="0.85"
                />
              );
            })}
            {stage >= 4 && !dead && <circle cx={w/2+frondR*0.35} cy={h-trunkH-2} r={4} fill="var(--amber)"/>}
          </>
        )}
        {stage < 0.01 && <ellipse cx={w/2} cy={h-7} rx={4} ry={3} fill={c1}/>}
      </svg>
    );
  }

  if (type === 'fern') {
    const yTop = h - (8 + stage * 10);
    const segs = stage < 2 ? 3 : stage < 3 ? 4 : stage < 4 ? 6 : 8;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
        {stage >= 1 && <path d={`M ${w/2} ${h} C ${w/2} ${h-(6+stage*4)}, ${w/2} ${yTop}, ${w/2} ${yTop-6}`} stroke={cs} strokeWidth="2.5" fill="none" strokeLinecap="round" />}
        {stage >= 2 && Array.from({ length: segs }).map((_, i) => {
          const t = i / (segs-1 || 1);
          const y = h - (10 + t * (stage * 10 + 6));
          const x = 6 + stage * 2.2;
          const fill = i % 3 === 0 ? c1 : i % 3 === 1 ? c2 : c3;
          return (
            <g key={i} opacity="0.9">
              <path d={`M ${w/2} ${y} C ${w/2-x} ${y-4}, ${w/2-x} ${y-10}, ${w/2} ${y-10}`} stroke={fill} strokeWidth="2.1" fill="none" strokeLinecap="round"/>
              <path d={`M ${w/2} ${y+2} C ${w/2+x} ${y-2}, ${w/2+x} ${y-8}, ${w/2} ${y-8}`} stroke={fill} strokeWidth="2.1" fill="none" strokeLinecap="round"/>
            </g>
          );
        })}
        {stage >= 4 && !dead && <circle cx={w/2} cy={h-(18+stage*6)} r={4} fill="var(--amber)" opacity="0.95"/>}
        {stage < 0.01 && <ellipse cx={w/2} cy={h-7} rx={4} ry={3} fill={c1}/>}
      </svg>
    );
  }

  if (type === 'grain') {
    const stalkH = 8 + stage * 7;
    const grains = stage < 2 ? 4 : stage < 3 ? 7 : stage < 4 ? 10 : 13;
    const topY = h - stalkH;
    return (
      <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
        {stage >= 1 && <line x1={w/2} y1={h} x2={w/2} y2={topY} stroke={cs} strokeWidth="2.6" strokeLinecap="round"/>}
        {stage >= 1 && (
          <>
            {Array.from({ length: grains }).map((_, i) => {
              const t = (i / grains) - 0.5;
              const px = w/2 + t * (16 + stage * 4);
              const py = topY + 4 + Math.abs(t) * 6;
              const gFill = i % 3 === 0 ? c1 : i % 3 === 1 ? c2 : c3;
              return <ellipse key={i} cx={px} cy={py} rx={4} ry={2.6} fill={gFill} opacity="0.9"/>;
            })}
            {stage >= 4 && !dead && <circle cx={w/2} cy={topY+8} r={4} fill="var(--amber)" opacity="0.95"/>}
          </>
        )}
        {stage < 0.01 && <ellipse cx={w/2} cy={h-7} rx={4} ry={3} fill={c1}/>}
      </svg>
    );
  }

  /* sprout */
  const sh = 6 + stage * 8;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} className="plant-svg">
      {stage >= 1 && <line x1={w/2} y1={h} x2={w/2} y2={h-sh} stroke={cs} strokeWidth="2.5" strokeLinecap="round"/>}
      {stage >= 2 && <>
        <ellipse cx={w/2-6} cy={h-sh+4} rx={7} ry={4} fill={c1} transform={`rotate(-30,${w/2-6},${h-sh+4})`}/>
        <ellipse cx={w/2+6} cy={h-sh+8} rx={7} ry={4} fill={c2} transform={`rotate(30,${w/2+6},${h-sh+8})`}/>
      </>}
      {stage >= 3 && <>
        <ellipse cx={w/2-8} cy={h-sh-2} rx={9} ry={5} fill={c2} transform={`rotate(-40,${w/2-8},${h-sh-2})`}/>
        <ellipse cx={w/2+8} cy={h-sh+2} rx={9} ry={5} fill={c3} transform={`rotate(40,${w/2+8},${h-sh+2})`}/>
      </>}
      {stage >= 4 && <circle cx={w/2} cy={h-sh-6} r={6} fill={dead ? 'var(--dead)' : 'var(--amber)'}/>}
      {stage < 0.01 && <ellipse cx={w/2} cy={h-7} rx={4} ry={3} fill={c1}/>}
    </svg>
  );
}

/* ── Plant ── */
function Plant({ plant, now, onClick }) {
  const stage = calcGrowthStage(plant, now);
  const label = plant.title.length > 14 ? plant.title.slice(0, 13) + '…' : plant.title;
  return (
    <div
      className="plant-wrap"
      style={{ left: plant.position.x + '%', top: plant.position.y + '%' }}
      onClick={e => { e.stopPropagation(); onClick(plant); }}
      title={plant.title}
    >
      <PlantSVG type={plant.type} stage={stage} isDead={plant.isDead} isCompleted={plant.isCompleted}/>
      <div className="plant-label">{label}</div>
    </div>
  );
}

/* ── Create Modal ── */
function PlantModal({ onConfirm, onCancel }) {
  const [title, setTitle]       = useState('');
  const [duration, setDuration] = useState(30);
  const [plantType, setPlantType] = useState(PLANT_TYPES[0]);
  const inputRef = useRef(null);

  useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

  function submit() {
    const t = title.trim();
    if (!t) return;
    const d = Number(duration);
    if (!Number.isFinite(d) || d <= 0) return;
    onConfirm({ title: t, duration: Math.round(d), plantType });
  }

  function handleKey(e) {
    if (e.key === 'Enter')  submit();
    if (e.key === 'Escape') onCancel();
  }

  return (
    <div className="modal-overlay" onClick={onCancel}>
      <div className="modal" onClick={e => e.stopPropagation()}>
        <h2>Toxum ək</h2>
        <label>Tapşırıq adı</label>
        <input
          ref={inputRef} type="text"
          placeholder="nə əkirsən?"
          value={title}
          onChange={e => setTitle(e.target.value)}
          onKeyDown={handleKey}
          maxLength={40}
        />
        <label>Bitki növü</label>
        <select value={plantType} onChange={e => setPlantType(e.target.value)}>
          {PLANT_TYPES.map(t => (
            <option key={t} value={t}>{t}</option>
          ))}
        </select>
        <label>Müddət (dəqiqə)</label>
        <input
          type="number"
          min={1}
          step={1}
          value={duration}
          onChange={e => {
            const next = Number(e.target.value);
            if (!Number.isFinite(next)) return;
            // çox böyük rəqəmlər UI-ni poza bilər
            setDuration(Math.min(2400, Math.max(1, next)));
          }}
        />
        <div className="modal-actions">
          <button className="btn-secondary" onClick={onCancel}>İmtina</button>
          <button className="btn-primary"   onClick={submit}>Ək</button>
        </div>
      </div>
    </div>
  );
}

/* ── Detail Panel ── */
function DetailPanel({ plant, now, onComplete, onDelete, onClose }) {
  const stage    = calcGrowthStage(plant, now);
  const timeLeft = formatTimeLeft(plant, now);
  const stageShow = Math.round(stage * 10) / 10;
  return (
    <div className="detail-panel" onClick={e => e.stopPropagation()}>
      <h3>{plant.title}</h3>
      <div className="detail-row"><span>NÖV</span><span>{plant.type}</span></div>
      <div className="detail-row"><span>MƏRHƏLƏ</span><span>{stageShow} / 4</span></div>
      <div className="detail-row"><span>VAXT</span><span>{timeLeft}</span></div>
      <div className="detail-row">
        <span>VƏZİYYƏT</span>
        <span>{plant.isCompleted ? '✓ tamamlandı' : plant.isDead ? '✗ məhv oldu' : '◎ böyüyür'}</span>
      </div>
      <div className="detail-actions">
        {!plant.isCompleted && !plant.isDead && (
          <button className="btn-complete" onClick={() => onComplete(plant.id)}>✓ Tamamla</button>
        )}
        <button className="btn-delete" onClick={() => onDelete(plant.id)}>✗ Sil</button>
        <button className="btn-close" onClick={onClose}>Bağla</button>
      </div>
    </div>
  );
}

/* ── Status Bar ── */
function StatusBar({ plants }) {
  const alive     = plants.filter(p => !p.isDead && !p.isCompleted).length;
  const completed = plants.filter(p => p.isCompleted).length;
  const dead      = plants.filter(p => p.isDead).length;
  return (
    <div id="statusbar">
      <span>Cəmi: <b>{plants.length}</b></span>
      <span>Böyüyür: <b>{alive}</b></span>
      <span>Tamamlandı: <b>{completed}</b></span>
      <span className="dead">Məhv: <b>{dead}</b></span>
    </div>
  );
}

/* ── App ── */
function App() {
  const [plants, setPlants]         = useState(() => loadPlants());
  const [now, setNow]               = useState(Date.now());
  const [pendingPos, setPendingPos] = useState(null);
  const [selectedId, setSelectedId] = useState(null);

  /* tick */
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), TICK_MS);
    return () => clearInterval(id);
  }, []);

  /* save */
  useEffect(() => { savePlants(plants); }, [plants]);

  /* update dead & stage on tick */
  useEffect(() => {
    setPlants(prev => prev.map(p => {
      if (p.isCompleted || p.isDead) return p;
      const newDead  = now > p.deadline;
      const newStage = calcGrowthStage(p, now);
      if (newDead !== p.isDead || newStage !== p.growthStage) {
        return { ...p, isDead: newDead, growthStage: newStage };
      }
      return p;
    }));
  }, [now]);

  const handleGardenClick = useCallback(e => {
    if (e.target.closest('.plant-wrap') || e.target.closest('.detail-panel')) return;
    setSelectedId(null);
    const rect = e.currentTarget.getBoundingClientRect();
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));
    const x = clamp(((e.clientX - rect.left) / rect.width)  * 100, 5, 95);
    // div-in translateY(-100%) davranışına görə y-ni bir az yuxarıdan saxlamaq lazımdır
    const y = clamp(((e.clientY - rect.top)  / rect.height) * 100, 15, 98);
    setPendingPos({ x, y });
  }, []);

  const handleConfirm = useCallback(({ title, duration, plantType }) => {
    if (!pendingPos) return;
    const plantedAt = Date.now();
    const deadline  = plantedAt + duration * 60 * 1000;
    const type      = plantType || PLANT_TYPES[Math.floor(Math.random() * PLANT_TYPES.length)];
    const newPlant = {
      id: generateId(), type, title,
      growthStage: 0, plantedAt, deadline,
      isDead: false, isCompleted: false,
      position: pendingPos,
    };
    setPlants(prev => [...prev, newPlant]);
    setPendingPos(null);
  }, [pendingPos]);

  const handleComplete = useCallback(id => {
    setPlants(prev => prev.map(p =>
      p.id === id ? { ...p, isCompleted: true, isDead: false, growthStage: 4 } : p
    ));
  }, []);

  const handleDelete = useCallback(id => {
    setPlants(prev => prev.filter(p => p.id !== id));
    setSelectedId(null); // detail-panel-i bağlayırıq
  }, []);

  const selectedPlant = selectedId ? plants.find(p => p.id === selectedId) || null : null;

  return (
    <>
      <div id="header">
        <h1>🌱 Productivity Garden</h1>
        <span className="hint">Toxum əkmək üçün bağa klikləyin</span>
      </div>

      <div id="garden" onClick={handleGardenClick}>
        {plants.map(plant => (
          <Plant key={plant.id} plant={plant} now={now}
                 onClick={p => setSelectedId(p.id)}/>
        ))}
      </div>

      {pendingPos && (
        <PlantModal
          onConfirm={handleConfirm}
          onCancel={() => setPendingPos(null)}
        />
      )}

      {selectedPlant && (
        <DetailPanel
          plant={selectedPlant}
          now={now}
          onComplete={handleComplete}
          onDelete={handleDelete}
          onClose={() => setSelectedId(null)}
        />
      )}

      <StatusBar plants={plants}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
